<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 医療法人おひさま会 DX推進部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--red:#D2422D;--orange:#FF5100;--yellow:#FAC100;--bg:#FAFAFA;--text:#1e2028;--text2:#5f6577;--card-bg:#fff}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans JP','Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.8}

    /* ナビ */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 0;transition:all .3s;background:rgba(255,255,255,.95);box-shadow:0 1px 12px rgba(0,0,0,.06)}
    .nav-inner{max-width:1120px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .nav-logo-img{height:28px;width:auto}
    .nav-back{color:var(--text2);text-decoration:none;font-size:.85rem;font-weight:500;transition:color .2s}
    .nav-back:hover{color:var(--red)}

    /* ヒーロー */
    .hero{padding:140px 24px 60px;text-align:center;background:linear-gradient(135deg,#fff5f0 0%,#fff 40%,#fef8f0 100%)}
    .hero h1{font-size:2rem;font-weight:900;letter-spacing:-.02em;margin-bottom:12px}
    .hero p{font-size:1rem;color:var(--text2);max-width:600px;margin:0 auto}

    /* フォーム */
    .form-container{max-width:640px;margin:-20px auto 60px;padding:0 24px}
    .form-card{background:var(--card-bg);border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06)}
    .form-group{margin-bottom:24px}
    .form-group label{display:block;font-size:.85rem;font-weight:700;margin-bottom:6px;color:var(--text)}
    .form-group label .req{color:var(--red);font-size:.75rem;margin-left:4px}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:10px;font-size:.95rem;font-family:inherit;transition:border-color .2s;background:#fff;color:var(--text)}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(210,66,45,.1)}
    .form-group textarea{min-height:160px;resize:vertical}
    .form-note{font-size:.78rem;color:var(--text2);margin-top:4px}

    .submit-btn{display:block;width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .3s;letter-spacing:.05em}
    .submit-btn:hover{background:#b8351f;transform:translateY(-1px);box-shadow:0 4px 16px rgba(210,66,45,.3)}
    .submit-btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}

    /* 状態表示 */
    .form-status{display:none;text-align:center;padding:40px 24px}
    .form-status.show{display:block}
    .form-status .icon{font-size:3rem;margin-bottom:16px}
    .form-status h2{font-size:1.3rem;font-weight:900;margin-bottom:12px}
    .form-status p{color:var(--text2);font-size:.95rem;line-height:1.8}
    .back-btn{display:inline-block;margin-top:24px;padding:12px 32px;background:var(--bg);color:var(--text);border:1px solid #ddd;border-radius:10px;text-decoration:none;font-size:.9rem;font-weight:500;transition:all .2s}
    .back-btn:hover{border-color:var(--red);color:var(--red)}

    /* フッター */
    footer{background:#1e2028;color:rgba(255,255,255,.7);text-align:center;padding:40px 24px;font-size:.82rem}
    footer .logo-img{height:50px;width:auto;margin-bottom:12px;filter:brightness(10)}

    /* レスポンシブ */
    @media(max-width:600px){
      .hero h1{font-size:1.5rem}
      .form-card{padding:28px 20px}
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="../" class="nav-logo"><img src="../img/logo.png" alt="OHISAMAKAI" class="nav-logo-img"></a>
      <a href="../" class="nav-back">← トップに戻る</a>
    </div>
  </nav>

  <div class="hero">
    <h1>お問い合わせ</h1>
    <p>DX推進部へのご質問・ご相談はこちらからお気軽にどうぞ。</p>
  </div>

  <div class="form-container">
    <div class="form-card" id="formCard">
      <form id="contactForm">
        <div class="form-group">
          <label>お名前<span class="req">*必須</span></label>
          <input type="text" name="name" required placeholder="山田 太郎">
        </div>

        <div class="form-group">
          <label>会社名・団体名</label>
          <input type="text" name="organization" placeholder="株式会社○○">
        </div>

        <div class="form-group">
          <label>メールアドレス<span class="req">*必須</span></label>
          <input type="email" name="email" required placeholder="example@example.com">
        </div>

        <div class="form-group">
          <label>お問い合わせ種別</label>
          <select name="category">
            <option value="一般的なお問い合わせ">一般的なお問い合わせ</option>
            <option value="DXに関するご相談">DXに関するご相談</option>
            <option value="視察・見学のご依頼">視察・見学のご依頼</option>
            <option value="講演・登壇のご依頼">講演・登壇のご依頼</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label>お問い合わせ内容<span class="req">*必須</span></label>
          <textarea name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
        </div>

        <p class="form-note" style="margin-bottom:20px">※ 通常2〜3営業日以内にご返信いたします。</p>

        <button type="submit" class="submit-btn" id="submitBtn">送信する</button>
      </form>
    </div>

    <!-- 送信完了 -->
    <div class="form-status" id="successMsg">
      <div class="icon">✅</div>
      <h2>送信完了しました</h2>
      <p>お問い合わせいただきありがとうございます。<br>内容を確認のうえ、担当者よりご連絡いたします。</p>
      <a href="../" class="back-btn">トップページに戻る</a>
    </div>

    <!-- エラー -->
    <div class="form-status" id="errorMsg">
      <div class="icon">⚠️</div>
      <h2>送信に失敗しました</h2>
      <p>申し訳ございません。時間をおいて再度お試しください。<br>または <strong>dx.connect@nhw.jp</strong> まで直接ご連絡ください。</p>
      <a href="javascript:location.reload()" class="back-btn">もう一度試す</a>
    </div>
  </div>

  <footer>
    <img src="../img/logo-footer.png" alt="OHISAMAKAI" class="logo-img"><br>
    <p>医療法人おひさま会 — 在宅医療を、テクノロジーで支える</p>
    <p style="margin-top:8px">© 2026 医療法人おひさま会. All rights reserved.</p>
  </footer>

  <!-- 送信用の非表示iframe -->
  <iframe name="gas_iframe" id="gasIframe" style="display:none"></iframe>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxGRwKkwjCnXikGLpR_8mRrCqTBBqTNBT0RGS8YZjA1cHlhu8laeSi24Lv5gh-mwLlR/exec';

    const form = document.getElementById('contactForm');
    const formCard = document.getElementById('formCard');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      // hidden formを動的に作成してsubmit（確実にGASに届く方式）
      const hiddenForm = document.createElement('form');
      hiddenForm.method = 'POST';
      hiddenForm.action = GAS_URL;
      hiddenForm.target = 'gas_iframe';

      // JSONデータをhidden inputとして追加
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'payload';
      input.value = JSON.stringify(data);
      hiddenForm.appendChild(input);

      document.body.appendChild(hiddenForm);
      hiddenForm.submit();
      document.body.removeChild(hiddenForm);

      // 3秒後に成功表示（iframeのレスポンスは読めないので時間で判定）
      setTimeout(() => {
        formCard.style.display = 'none';
        successMsg.classList.add('show');
      }, 2000);
    });
  </script>
</body>
</html>
